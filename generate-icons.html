<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroPlus Icon Generator</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 540px; margin: 40px auto; padding: 20px; background: #edf0f5; }
  h2 { color: #3451d1; }
  .btn { background: #3451d1; color: #fff; border: none; border-radius: 12px; padding: 12px 24px; font-size: 15px; font-weight: 700; cursor: pointer; margin: 6px 4px; }
  .btn:hover { background: #2a3fa8; }
  .preview { display: flex; flex-wrap: wrap; gap: 16px; margin: 20px 0; }
  .preview-item { text-align: center; font-size: 12px; color: #5a6472; }
  canvas { display: block; border-radius: 8px; border: 1px solid #cdd3e0; }
  .note { background: #eef2ff; border: 1px solid #3451d130; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #3451d1; margin: 16px 0; line-height: 1.6; }
</style>
</head>
<body>
<h2>AeroPlus Deco — Icon Generator</h2>
<p style="color:#5a6472;font-size:14px">Click the buttons below to download each icon. Add all four PNG files to your GitHub repo root.</p>

<div class="note">
  <strong>Files to download:</strong><br>
  icon-192.png &nbsp;·&nbsp; icon-512.png &nbsp;·&nbsp; icon-maskable-192.png &nbsp;·&nbsp; icon-maskable-512.png
</div>

<div class="preview" id="preview"></div>

<button class="btn" onclick="downloadAll()">⬇ Download all 4 icons</button>

<script>
// AeroPlus logo drawing function
function drawLogo(ctx, size, maskable) {
  const pad = maskable ? size * 0.12 : 0;  // safe zone padding for maskable
  const s = size - pad * 2;
  const ox = pad, oy = pad;

  // Background
  ctx.fillStyle = '#3451d1';
  if (maskable) {
    // Full bleed for maskable (no rounded corners needed — OS clips it)
    ctx.fillRect(0, 0, size, size);
  } else {
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
  }

  // Scale helpers
  function px(x) { return ox + (x / 100) * s; }
  function py(y) { return oy + (y / 100) * s; }

  // Main A shape — white
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(px(18), py(82));
  ctx.lineTo(px(50), py(14));
  ctx.lineTo(px(82), py(82));
  ctx.lineTo(px(62), py(82));
  ctx.lineTo(px(50), py(52));
  ctx.lineTo(px(38), py(82));
  ctx.closePath();
  ctx.fill();

  // Inner triangle — sky blue
  ctx.fillStyle = '#72c4e8';
  ctx.beginPath();
  ctx.moveTo(px(38), py(82));
  ctx.lineTo(px(50), py(52));
  ctx.lineTo(px(62), py(82));
  ctx.closePath();
  ctx.fill();

  // Top accent — sky blue
  ctx.fillStyle = '#72c4e8';
  ctx.beginPath();
  ctx.moveTo(px(50), py(14));
  ctx.lineTo(px(66), py(42));
  ctx.quadraticCurveTo(px(72), py(36), px(68), py(28));
  ctx.closePath();
  ctx.fill();
}

const sizes = [
  { name: 'icon-192.png',          size: 192, maskable: false },
  { name: 'icon-512.png',          size: 512, maskable: false },
  { name: 'icon-maskable-192.png', size: 192, maskable: true  },
  { name: 'icon-maskable-512.png', size: 512, maskable: true  },
];

const preview = document.getElementById('preview');
const canvases = {};

sizes.forEach(({ name, size, maskable }) => {
  const displaySize = Math.min(size, 96);
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawLogo(ctx, size, maskable);
  canvases[name] = canvas;

  // Preview (scaled down)
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = displaySize;
  previewCanvas.height = displaySize;
  const pCtx = previewCanvas.getContext('2d');
  pCtx.drawImage(canvas, 0, 0, displaySize, displaySize);

  const item = document.createElement('div');
  item.className = 'preview-item';
  item.appendChild(previewCanvas);
  item.innerHTML += `<div style="margin-top:4px">${name}</div><div style="color:#9aa0aa">${size}×${size}</div>`;
  preview.appendChild(item);
});

function download(name) {
  const canvas = canvases[name];
  const link = document.createElement('a');
  link.download = name;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  sizes.forEach(({ name }, i) => {
    setTimeout(() => download(name), i * 300);
  });
}
</script>
</body>
</html>
